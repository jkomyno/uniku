name: 'Setup Node.js'
description: 'Setup Node.js and pnpm with caching'

outputs:
  node-version:
    description: 'Default Node.js version from mise.toml'
    value: ${{ steps.runtime-versions.outputs.node-version }}
  node-compat-version:
    description: 'Minimum compatible Node.js version from mise.toml'
    value: ${{ steps.runtime-versions.outputs.node-compat-version }}
  bun-test-version:
    description: 'Bun test channel from mise.toml'
    value: ${{ steps.runtime-versions.outputs.bun-test-version }}
  deno-version:
    description: 'Deno version from mise.toml'
    value: ${{ steps.runtime-versions.outputs.deno-version }}

runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

    - name: Setup Turbo cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Setup mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        add_shims_to_path: false
        cache: false
        install: false

    - name: Resolve runtime versions
      id: runtime-versions
      shell: bash
      run: |
        node_version="$(mise config get -f mise.toml tools.node)"
        node_compat_version="$(mise config get -f mise.toml vars.node_compat)"
        bun_test_version="$(mise config get -f mise.toml vars.bun_test)"
        deno_version="$(mise config get -f mise.toml tools.deno)"

        echo "node-version=$node_version" >> "$GITHUB_OUTPUT"
        echo "node-compat-version=$node_compat_version" >> "$GITHUB_OUTPUT"
        echo "bun-test-version=$bun_test_version" >> "$GITHUB_OUTPUT"
        echo "deno-version=$deno_version" >> "$GITHUB_OUTPUT"

    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml
        node-version: ${{ steps.runtime-versions.outputs.node-version }}
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
