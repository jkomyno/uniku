name: E2E Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'packages/uniku/src/**'
      - 'packages/uniku/__tests__/e2e/**'
  pull_request:
    paths:
      - 'packages/uniku/src/**'
      - 'packages/uniku/__tests__/e2e/**'
  workflow_dispatch:

concurrency:
  group: e2e-cloudflare-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"

jobs:
  e2e-cloudflare:
    name: E2E Tests (Cloudflare Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

      - name: Run E2E Tests
        run: pnpm test:e2e:cloudflare
