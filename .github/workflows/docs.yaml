name: Docs

on:
  push:
    branches:
      - main
    paths: &docs-paths
      - "apps/docs/**"
      - "docs/**"
      - "packages/uniku/src/**"
      - "README.md"
      - "packages/cli/README.md"
      - "packages/uniku/README.md"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    # `closed` is required so the preview job can tear down a PR's preview
    # when it's merged or closed without a final push - it is not part of
    # `pull_request`'s default type set (opened, synchronize, reopened).
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths: *docs-paths
  workflow_dispatch:

concurrency:
  # A merged PR emits both a push to main and pull_request.closed. Group PR
  # runs by number so preview cleanup cannot cancel the production deployment.
  group: docs-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build docs
    # Nothing to typecheck/build when a PR is merely being closed - the
    # preview job tears down its own deployment independently of this job.
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Typecheck docs and snippets
        run: pnpm docs:typecheck

      - name: Build static site
        run: pnpm docs:build

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build static site
        run: pnpm docs:build

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: apps/docs/dist/client
          branch: gh-pages
          # Preserve concurrently deployed PR previews living under pr-preview/.
          clean-exclude: pr-preview
          force: false

  preview:
    name: Deploy PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: ./.github/actions/setup-node

      - name: Build static site
        # No build needed when the PR is closed: the preview action only
        # removes the existing deployment in that case.
        if: github.event.action != 'closed'
        env:
          DOCS_BASE_PATH: /uniku/pr-preview/pr-${{ github.event.number }}/
        run: pnpm docs:build

      - name: Deploy or remove preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: apps/docs/dist/client
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          wait-for-pages-deployment: true
