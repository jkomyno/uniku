name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - "packages/uniku/src/**"
      - "packages/uniku/__tests__/bench/**"
      - ".github/workflows/bench.yaml"
  pull_request:
    paths:
      - "packages/uniku/src/**"
      - "packages/uniku/__tests__/bench/**"
      - ".github/workflows/bench.yaml"
  workflow_dispatch:

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0 # Need full history for branch operations

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Run benchmarks
        run: pnpm bench:compat
        working-directory: packages/uniku

      # Fetch baseline from gh-benchmarks branch
      - name: Fetch baseline
        id: baseline
        run: |
          git fetch origin gh-benchmarks:gh-benchmarks 2>/dev/null || true
          if git show gh-benchmarks:baseline.json > packages/uniku/baseline.json 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No baseline found - first run or new benchmarks"
          fi

      # Compare benchmarks (PR only)
      - name: Compare benchmarks
        if: github.event_name == 'pull_request' && steps.baseline.outputs.exists == 'true'
        id: compare
        working-directory: packages/uniku
        run: |
          set +e
          OUTPUT=$(CI=true bun scripts/bench-compare.ts baseline.json bench-results.json 2>&1)
          EXIT_CODE=$?
          set -e

          {
            echo 'COMPARISON<<EOF'
            echo "$OUTPUT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "has_regression=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate benchmark summary
        id: bench_summary
        run: |
          {
            echo 'BENCH_SUMMARY<<EOF'
            bun scripts/bench-summary.ts
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        working-directory: packages/uniku

      - name: Generate bundle summary
        id: bundle_summary
        run: |
          {
            echo 'BUNDLE_SUMMARY<<EOF'
            bun scripts/bundle-summary.ts
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        working-directory: packages/uniku

      - name: Find existing comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@a4ef349b8c29f841860ce94ed82b20f0a39b6961 # v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- benchmark-results -->"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@f5b41f6a455733f2c5f73ca67a62631e75861578 # v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- benchmark-results -->
            ${{ steps.bench_summary.outputs.BENCH_SUMMARY }}

            ${{ steps.baseline.outputs.exists == 'true' && '### Comparison vs Main' || '' }}

            ${{ steps.baseline.outputs.exists == 'true' && steps.compare.outputs.COMPARISON || '> No baseline available for comparison. Baseline will be created when this PR merges.' }}

            ${{ steps.bundle_summary.outputs.BUNDLE_SUMMARY }}

            <sub>Generated by workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
          edit-mode: replace

      - name: React to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions \
            -f content=eyes \
            --silent || true

      # Report regressions without failing PRs. Shared-runner benchmark variance can
      # exceed the threshold for rows unrelated to the current change.
      - name: Report benchmark regressions
        if: github.event_name == 'pull_request' && steps.compare.outputs.has_regression == 'true'
        run: |
          echo "::warning::Performance regression detected; see PR comment for details."

      # Update baseline on main merge
      - name: Update baseline
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to gh-benchmarks branch (create orphan if doesn't exist)
          if git show-ref --verify --quiet refs/heads/gh-benchmarks; then
            git checkout gh-benchmarks
          else
            git checkout --orphan gh-benchmarks
            git rm -rf . 2>/dev/null || true
          fi

          # Copy results and commit
          cp packages/uniku/bench-results.json baseline.json
          git add baseline.json
          git commit -m "Update benchmark baseline from ${{ github.sha }}" --allow-empty

          # Force push to gh-benchmarks
          git push origin gh-benchmarks --force
