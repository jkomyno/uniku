name: Benchmarks

on:
  push:
    branches: [main]
    paths: &benchmark_paths
      - "packages/uniku/src/**"
      - "packages/uniku/__tests__/bench/**"
      - "packages/uniku/scripts/**"
      - ".github/workflows/bench.yaml"
  pull_request:
    paths: *benchmark_paths
  workflow_dispatch:

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    name: Run Benchmarks
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0 # Need full history for branch operations

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Run benchmarks
        run: |
          mkdir -p "$RUNNER_TEMP/bench-runs"
          orders=(uniku-first reference-first uniku-first reference-first)
          for iteration in "${!orders[@]}"; do
            UNIKU_BENCH_ORDER="${orders[$iteration]}" pnpm bench:compat
            run_number=$((iteration + 1))
            cp bench-results.json "$RUNNER_TEMP/bench-runs/$run_number.json"
          done
          bun scripts/bench-aggregate.ts bench-results.json "$RUNNER_TEMP"/bench-runs/*.json
        working-directory: packages/uniku

      - name: Measure cold starts
        run: |
          set -o pipefail
          pnpm bench:cold-start | tee "$RUNNER_TEMP/cold-start.md"
        working-directory: packages/uniku

      # Fetch baseline from gh-benchmarks branch
      - name: Fetch baseline
        id: baseline
        run: |
          git fetch origin gh-benchmarks:gh-benchmarks 2>/dev/null || true
          if git show gh-benchmarks:baseline.json > packages/uniku/baseline.json 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No baseline found - first run or new benchmarks"
          fi

      # Compare benchmarks (PR only)
      - name: Compare benchmarks
        if: github.event_name == 'pull_request' && steps.baseline.outputs.exists == 'true'
        id: compare
        working-directory: packages/uniku
        run: |
          set +e
          OUTPUT=$(CI=true bun scripts/bench-compare.ts baseline.json bench-results.json 2>&1)
          EXIT_CODE=$?
          set -e

          printf '%s\n' "$OUTPUT" > "$RUNNER_TEMP/bench-comparison.md"

          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "has_regression=true" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "has_regression=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$OUTPUT"
            exit "$EXIT_CODE"
          fi

      - name: Generate benchmark summary
        run: |
          set -o pipefail
          bun scripts/bench-summary.ts | tee "$RUNNER_TEMP/bench-summary.md"
        working-directory: packages/uniku

      - name: Generate bundle summary
        run: |
          set -o pipefail
          bun scripts/bundle-summary.ts | tee "$RUNNER_TEMP/bundle-summary.md"
        working-directory: packages/uniku

      - name: Create PR comment artifact
        if: github.event_name == 'pull_request'
        run: |
          comment="$RUNNER_TEMP/benchmark-pr-comment.md"
          {
            echo "<!-- benchmark-results -->"
            cat "$RUNNER_TEMP/bench-summary.md"
            echo
            cat "$RUNNER_TEMP/cold-start.md"
            echo
            if [ "${{ steps.baseline.outputs.exists }}" = "true" ]; then
              echo "### Comparison vs Main"
              cat "$RUNNER_TEMP/bench-comparison.md"
            else
              echo "> No baseline available for comparison. Baseline will be created when this PR merges."
            fi
            echo
            cat "$RUNNER_TEMP/bundle-summary.md"
            echo
            echo "<sub>Generated by workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>"
          } > "$comment"
          cat "$comment" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PR comment artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-pr-comment
          path: ${{ runner.temp }}/benchmark-pr-comment.md
          retention-days: 7

      # Report regressions without failing PRs. Shared-runner benchmark variance can
      # exceed the threshold for rows unrelated to the current change.
      - name: Report benchmark regressions
        if: steps.compare.outputs.has_regression == 'true'
        run: |
          echo "::warning::Performance regression detected; see PR comment for details."

  update-baseline:
    name: Update Benchmark Baseline
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0 # Need full history for branch operations

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Run benchmarks
        run: |
          mkdir -p "$RUNNER_TEMP/bench-runs"
          orders=(uniku-first reference-first uniku-first reference-first)
          for iteration in "${!orders[@]}"; do
            UNIKU_BENCH_ORDER="${orders[$iteration]}" pnpm bench:compat
            run_number=$((iteration + 1))
            cp bench-results.json "$RUNNER_TEMP/bench-runs/$run_number.json"
          done
          bun scripts/bench-aggregate.ts bench-results.json "$RUNNER_TEMP"/bench-runs/*.json
        working-directory: packages/uniku

      - name: Update baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-benchmarks:gh-benchmarks 2>/dev/null || true
          git show gh-benchmarks:baseline.json > "$RUNNER_TEMP/benchmark-baseline.json" 2>/dev/null \
            || rm -f "$RUNNER_TEMP/benchmark-baseline.json"
          bun packages/uniku/scripts/bench-history.ts "$RUNNER_TEMP/baseline.json" "$RUNNER_TEMP/benchmark-baseline.json" packages/uniku/bench-results.json

          # Switch to gh-benchmarks branch (create orphan if doesn't exist)
          if git show-ref --verify --quiet refs/heads/gh-benchmarks; then
            git checkout gh-benchmarks
          else
            git checkout --orphan gh-benchmarks
            git rm -rf . 2>/dev/null || true
          fi

          # Copy the rolling action-level aggregate and commit.
          cp "$RUNNER_TEMP/baseline.json" baseline.json
          git add baseline.json
          git commit -m "Update benchmark baseline from ${{ github.sha }}" --allow-empty

          # Force push to gh-benchmarks
          git push origin gh-benchmarks --force

          # Keep local actions available for their post-job cleanup hooks.
          git checkout "$GITHUB_SHA"
