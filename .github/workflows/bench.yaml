name: Benchmarks

on:
  pull_request:
    paths:
      - "packages/uniku/src/**"
      - "packages/uniku/__tests__/bench/**"
      - ".github/workflows/bench.yaml"
  workflow_dispatch:

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Run benchmarks
        run: pnpm bench:compat
        working-directory: packages/uniku

      - name: Generate benchmark summary
        id: bench_summary
        run: |
          {
            echo 'BENCH_SUMMARY<<EOF'
            bun scripts/bench-summary.ts
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        working-directory: packages/uniku

      - name: Generate bundle summary
        id: bundle_summary
        run: |
          {
            echo 'BUNDLE_SUMMARY<<EOF'
            bun scripts/bundle-summary.ts
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        working-directory: packages/uniku

      - name: Find existing comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@a4ef349b8c29f841860ce94ed82b20f0a39b6961 # v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- benchmark-results -->"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@f5b41f6a455733f2c5f73ca67a62631e75861578 # v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- benchmark-results -->
            ${{ steps.bench_summary.outputs.BENCH_SUMMARY }}

            ${{ steps.bundle_summary.outputs.BUNDLE_SUMMARY }}

            <sub>Generated by workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
          edit-mode: replace

      - name: React to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions \
            -f content=eyes \
            --silent || true
