name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - ".claude/**"
      - "rfcs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"

jobs:
  check:
    name: Type Check + Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Type check
        run: pnpm typecheck

      - name: ShellCheck
        shell: bash
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

          shellcheck install.sh

      - name: Lint
        run: pnpm lint:ci

  test:
    name: Test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install dependencies
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm --filter uniku build

      - name: Setup test Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Unit tests
        env:
          npm_config_loglevel: "error"
          npm_config_update_notifier: "false"
        run: npm run test:ci:node-matrix

  smoke-bun:
    name: Bun Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Runtime smoke
        run: pnpm --filter uniku smoke:runtime:bun

  smoke-deno:
    name: Deno Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: Build
        run: pnpm build

      - name: Runtime smoke
        run: pnpm --filter uniku smoke:runtime:deno

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Smoke test uniku package exports
        run: pnpm --filter uniku smoke:publish

      - name: Smoke test npm global CLI install
        shell: bash
        run: |
          set -euo pipefail

          pack_dir="$(mktemp -d)"
          prefix_dir="$(mktemp -d)"
          # Pack uniku alongside the CLI: pnpm pack rewrites the CLI's
          # "uniku": "workspace:*" to the exact workspace version, which is not
          # on the registry yet on changeset release PRs. Installing both
          # tarballs in one command lets npm resolve uniku locally.
          uniku_tarball="$(pnpm --filter uniku pack --pack-destination "$pack_dir" | tail -n 1)"
          cli_tarball="$(pnpm --filter @uniku/cli pack --pack-destination "$pack_dir" | tail -n 1)"

          npm install --global --prefix "$prefix_dir" "$uniku_tarball" "$cli_tarball"
          "$prefix_dir/bin/uniku" --help >/dev/null
          "$prefix_dir/bin/uniku" uuid >/dev/null

      - name: Build CLI binary (smoke test)
        run: pnpm --filter @uniku/cli build:binary

  preview:
    name: Preview Release
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [check, test, smoke-bun, smoke-deno, build]
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

      - name: Publish preview
        run: pnpm dlx pkg-pr-new publish './packages/*' --packageManager=pnpm
