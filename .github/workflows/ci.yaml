name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - ".claude/**"
      - "rfcs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"

jobs:
  check:
    name: Type Check + Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Type check
        run: pnpm typecheck

      - name: ShellCheck
        shell: bash
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

          shellcheck install.sh

      - name: Lint
        run: pnpm lint:ci

  runtime:
    name: Runtime (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Node.js latest 25.x
            runtime: node-current
          - name: Node.js minimum
            runtime: node-compat
          - name: Bun canary
            runtime: bun
          - name: Deno latest
            runtime: deno
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install dependencies
        id: toolchain
        uses: ./.github/actions/setup-node

      - name: Build library
        run: pnpm --filter uniku build

      - name: Setup minimum Node.js
        if: matrix.runtime == 'node-compat'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ steps.toolchain.outputs.node-compat-version }}

      - name: Setup Bun canary
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: ${{ steps.toolchain.outputs.bun-test-version }}

      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: ${{ steps.toolchain.outputs.deno-version }}

      - name: Test on Node.js
        if: startsWith(matrix.runtime, 'node-')
        env:
          npm_config_loglevel: "error"
          npm_config_update_notifier: "false"
        run: npm run test:ci:node-matrix

      - name: Test Bun runtimes
        if: matrix.runtime == 'bun'
        run: |
          pnpm --filter uniku smoke:runtime:bun
          pnpm --filter uniku smoke:runtime:browser

      - name: Test Deno runtime
        if: matrix.runtime == 'deno'
        run: pnpm --filter uniku smoke:runtime:deno

  coverage:
    name: Library Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Coverage gate
        run: pnpm test:coverage

  e2e-cloudflare:
    name: Cloudflare Workers E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build library
        run: pnpm --filter uniku build

      - name: Run E2E tests
        run: pnpm test:e2e:cloudflare

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build
        run: pnpm build

      - name: Smoke test uniku package exports
        run: pnpm --filter uniku smoke:publish

      - name: Smoke test npm global CLI install
        shell: bash
        run: |
          set -euo pipefail

          pack_dir="$(mktemp -d)"
          prefix_dir="$(mktemp -d)"
          # Pack uniku alongside the CLI: pnpm pack rewrites the CLI's
          # "uniku": "workspace:*" to the exact workspace version, which is not
          # on the registry yet on changeset release PRs. Installing both
          # tarballs in one command lets npm resolve uniku locally.
          uniku_tarball="$(pnpm --filter uniku pack --pack-destination "$pack_dir" | tail -n 1)"
          cli_tarball="$(pnpm --filter @uniku/cli pack --pack-destination "$pack_dir" | tail -n 1)"

          npm install --global --prefix "$prefix_dir" "$uniku_tarball" "$cli_tarball"
          "$prefix_dir/bin/uniku" --help >/dev/null
          "$prefix_dir/bin/uniku" uuid >/dev/null

      - name: Build CLI binary (smoke test)
        shell: bash
        run: |
          set -euo pipefail

          cd packages/cli
          bun scripts/build-binary.ts --target=bun-linux-x64 --name=uniku-linux-x64
          bun scripts/build-binary.ts --target=bun-linux-arm64 --name=uniku-linux-arm64

          for artifact in uniku-linux-x64 uniku-linux-arm64; do
            tar -tzf "dist/${artifact}.tar.gz" | grep -qx 'uniku'
            test -x "dist/${artifact}"
          done

  preview:
    name: Preview Release
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [check, runtime, coverage, e2e-cloudflare, build]
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

      - name: Publish preview
        run: pnpm dlx pkg-pr-new publish './packages/*' --packageManager=pnpm
