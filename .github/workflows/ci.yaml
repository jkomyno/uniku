name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - ".claude/**"
      - "rfcs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"

jobs:
  check:
    name: Type Check + Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:ci

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Smoke test npm global CLI install
        shell: bash
        run: |
          set -euo pipefail

          pack_dir="$(mktemp -d)"
          prefix_dir="$(mktemp -d)"
          tarball="$(pnpm --filter @uniku/cli pack --pack-destination "$pack_dir" | tail -n 1)"

          npm install --global --prefix "$prefix_dir" "$tarball"
          "$prefix_dir/bin/uniku" --help >/dev/null
          "$prefix_dir/bin/uniku" uuid >/dev/null

      - name: Build CLI binary (smoke test)
        run: pnpm --filter @uniku/cli build:binary

  preview:
    name: Preview Release
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [check, test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

      - name: Publish preview
        run: pnpm dlx pkg-pr-new publish './packages/*' --packageManager=pnpm
