name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false # Never cancel release in progress

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for npm OIDC trusted publishing

env:
  CI: "true"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      cli-version: ${{ steps.cli-version.outputs.version }}
    # Run on manual dispatch OR when CI succeeded
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@c8bada60c408975afd1a20b3db81d6eee6789308 # v1.4.9
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Extract CLI version
        id: cli-version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | select(.name == "@uniku/cli") | .version')
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    name: Build CLI Binary (${{ matrix.artifact_name }})
    needs: release
    if: needs.release.outputs.cli-version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact_name: uniku-linux-x64
          - target: bun-linux-arm64
            artifact_name: uniku-linux-arm64
          - target: bun-darwin-x64
            artifact_name: uniku-darwin-x64
          - target: bun-darwin-arm64
            artifact_name: uniku-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Build
        run: pnpm build

      - name: Build CLI binary
        working-directory: packages/cli
        run: bun scripts/build-binary.ts --target=${{ matrix.target }} --name=${{ matrix.artifact_name }}

      - name: Verify CLI binary archive
        working-directory: packages/cli
        shell: bash
        run: |
          set -euo pipefail

          tar -tzf dist/${{ matrix.artifact_name }}.tar.gz | grep -qx 'uniku'

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            packages/cli/dist/${{ matrix.artifact_name }}.tar.gz
            packages/cli/dist/${{ matrix.artifact_name }}.tar.gz.sha256

  cli-release:
    name: CLI Release
    needs: [release, build-binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-assets
          pattern: uniku-*
          merge-multiple: true

      - name: Generate combined checksums
        working-directory: release-assets
        run: cat -- *.sha256 > CHECKSUMS.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: uniku-cli-v${{ needs.release.outputs.cli-version }}
          name: "uniku CLI v${{ needs.release.outputs.cli-version }}"
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/CHECKSUMS.sha256
